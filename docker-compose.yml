services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_16_db
    restart: always
    environment:
      POSTGRES_USER: devsu
      POSTGRES_PASSWORD: devupass1
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsu"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    hostname: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: adminpass123
      RABBITMQ_DEFAULT_VHOST: rabbitmqvirtualhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  customer-service:
    build:
      context: ./customer-service
    container_name: customer-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  account-service:
    build:
      context: ./account-service
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"

volumes:
  pgdata:

  rabbitmq_data: